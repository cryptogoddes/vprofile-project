name: vProfile CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test the Pipeline
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build with Maven
        run: mvn install -DskipTests

      - name: Verify artifact was created
        run: ls -la target/*.war

      - name: Run tests
        run: mvn test

  deploy:
    name: Deploy to Beanstalk
    runs-on: ubuntu-latest
    needs: test
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build artifact
        run: mvn install -DskipTests

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904690835815:role/github-actions-deploy-role
          aws-region: us-east-2

      - name: Upload artifact to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          VERSION_LABEL=vprofile-$TIMESTAMP
          aws s3 cp target/vprofile-v2.war s3://vprofile-pipeline-artifacts-chidinma/$VERSION_LABEL.war
          echo "VERSION_LABEL=$VERSION_LABEL" >> $GITHUB_ENV

      - name: Create Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name vprofile-app-2 \
            --version-label ${{ env.VERSION_LABEL }} \
            --source-bundle S3Bucket=vprofile-pipeline-artifacts-chidinma,S3Key=${{ env.VERSION_LABEL }}.war

      - name: Deploy to Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --application-name vprofile-app-2 \
            --environment-name vprofile-app-2 \
            --version-label ${{ env.VERSION_LABEL }}

      - name: Deployment complete
        run: echo "Deployed ${{ env.VERSION_LABEL }} to Beanstalk!"

  deploy:
    name: Deploy to Beanstalk
    runs-on: ubuntu-latest
    needs: test
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build artifact
        run: mvn install -DskipTests

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904690835815:role/github-actions-deploy-role
          aws-region: us-east-2

      - name: Upload artifact to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          VERSION_LABEL=vprofile-$TIMESTAMP
          aws s3 cp target/vprofile-v2.war s3://vprofile-pipeline-artifacts-chidinma>
          echo "VERSION_LABEL=$VERSION_LABEL" >> $GITHUB_ENV

      - name: Create Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name vprofile-app-2 \
            --version-label ${{ env.VERSION_LABEL }} \
            --source-bundle S3Bucket=vprofile-pipeline-artifacts-chidinma,S3Key=${{ >

      - name: Deploy to Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --application-name vprofile-app-2 \
            --environment-name vprofile-app-2 \
            --version-label ${{ env.VERSION_LABEL }}

      - name: Deployment complete
